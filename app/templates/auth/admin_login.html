<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="login-message" content="{{ login_message|default('', true)|e }}">
    <meta name="login-message-category" content="{{ login_message_category|default('info', true)|e }}">
    <title>Owner Login</title>
    <link rel="icon" href="{{ url_for('static', filename='img/fastockflow-icon.png', v=asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css', v=asset_version) }}">
  </head>
  <body>
    <main class="login-page">
      <form class="login-card" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="flash login-message" data-login-message hidden></div>
        <div class="login-brand">
          <span class="brand-mark large logo-mark"><img src="{{ url_for('static', filename='img/fastockflow-icon.png', v=asset_version) }}" alt="FAstockFlow"></span>
          <div>
            <h1>Owner Login</h1>
            <p>Combined FirstTech and Aditya dashboard.</p>
          </div>
        </div>
        <label>Admin login ID
          <input name="email" type="text" autocomplete="username" required autofocus>
        </label>
        <label>Password
          <span class="password-wrap">
            <input id="admin_password" name="password" type="password" autocomplete="current-password" required>
            <button type="button" class="icon-button" data-toggle-password="#admin_password">Show</button>
          </span>
        </label>
        <button class="primary-button full" type="submit">Login</button>
        <a class="secondary-button full center-button" href="{{ url_for('auth.login') }}">Company login</a>
      </form>
    </main>
    <script src="{{ url_for('static', filename='js/app.js', v=asset_version) }}"></script>
    <script>
      (() => {
        const messageMeta = document.querySelector('meta[name="login-message"]');
        const categoryMeta = document.querySelector('meta[name="login-message-category"]');
        const target = document.querySelector("[data-login-message]");
        const message = messageMeta ? messageMeta.content.trim() : "";
        const category = categoryMeta ? categoryMeta.content.trim() : "info";
        if (!target || !message || message.includes("{".repeat(2))) return;
        target.textContent = message;
        target.classList.add(category || "info");
        target.hidden = false;
      })();
    </script>
  </body>
</html>
