<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="login-message" content="{{ login_message|default('', true)|e }}">
    <meta name="login-message-category" content="{{ login_message_category|default('info', true)|e }}">
    <title>Company Login</title>
    <link rel="icon" href="/static/img/fastockflow-icon.png?v=20260623-2">
    <link rel="stylesheet" href="/static/css/app.css?v=20260623-2">
  </head>
  <body>
    <main class="login-page">
      <form class="login-card" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="flash login-message" data-login-message hidden></div>
        <div class="login-brand">
          <span class="brand-mark large logo-mark"><img src="/static/img/fastockflow-icon.png?v=20260623-2" alt="FAstockFlow"></span>
          <div>
            <h1>FAstockFlow</h1>
            <p>Company login for FirstTech and Aditya users.</p>
          </div>
        </div>
        <div class="login-company-options" role="radiogroup" aria-label="Company login">
          <label class="login-company-option">
            <input name="email" type="radio" value="firsttech.user" required autofocus>
            <img src="/static/img/firsttech-logo.jpg?v=20260623-2" alt="FirstTech Machine LLP">
            <span>FirstTech Machine LLP</span>
            <small>Login ID: firsttech.user</small>
          </label>
          <label class="login-company-option">
            <input name="email" type="radio" value="adityainternational.user" required>
            <img src="/static/img/aditya-logo.jpg?v=20260623-2" alt="Aditya International">
            <span>Aditya International</span>
            <small>Login ID: Adityainternational.user</small>
          </label>
        </div>
        <label>Password
          <span class="password-wrap">
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button type="button" class="icon-button" data-toggle-password="#password">Show</button>
          </span>
        </label>
        <button class="primary-button full" type="submit">Login</button>
        <a class="secondary-button full center-button" href="/admin/login">Owner/admin login</a>
      </form>
    </main>
    <script src="/static/js/app.js?v=20260623-2"></script>
    <script>
      (() => {
        const messageMeta = document.querySelector('meta[name="login-message"]');
        const categoryMeta = document.querySelector('meta[name="login-message-category"]');
        const target = document.querySelector("[data-login-message]");
        const message = messageMeta ? messageMeta.content.trim() : "";
        const category = categoryMeta ? categoryMeta.content.trim() : "info";
        if (!target || !message || message.includes("{".repeat(2))) return;
        target.textContent = message;
        target.classList.add(category || "info");
        target.hidden = false;
      })();
    </script>
  </body>
</html>
