<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="login-message" content="{{ login_message|default('', true)|e }}">
    <meta name="login-message-category" content="{{ login_message_category|default('info', true)|e }}">
    <title>Register User</title>
    <link rel="icon" href="{{ url_for('static', filename='img/fastockflow-icon.png', v=asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css', v=asset_version) }}">
  </head>
  <body>
    <main class="login-page">
      <form class="login-card login-card-wide" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="flash login-message" data-login-message hidden></div>
        <div class="login-brand">
          <span class="brand-mark large logo-mark"><img src="{{ url_for('static', filename='img/fastockflow-icon.png', v=asset_version) }}" alt="FAstockFlow"></span>
          <div>
            <h1>Register User</h1>
            <p>Create a company-specific login for stock and account entries.</p>
          </div>
        </div>
        <div class="login-company-options" role="radiogroup" aria-label="Company">
          {% for company in companies %}
            <label class="login-company-option">
              <input name="company_id" type="radio" value="{{ company.id }}" required {% if form.get('company_id') == company.id|string or (not form.get('company_id') and loop.first) %}checked{% endif %} {% if loop.first %}autofocus{% endif %}>
              <img src="{{ url_for('static', filename=company_logo(company), v=asset_version) }}" alt="{{ company.name }}">
              <span>{{ company.name }}</span>
              <small>{{ company.code }} company workspace</small>
            </label>
          {% endfor %}
        </div>
        <div class="login-field-grid">
          <label>Name
            <input name="name" type="text" value="{{ form.get('name', '') }}" autocomplete="name" required>
          </label>
          <label>Login ID
            <input name="email" type="text" value="{{ form.get('email', '') }}" autocomplete="username" required>
          </label>
          <label>Password
            <span class="password-wrap">
              <input id="register_password" name="password" type="password" autocomplete="new-password" required>
              <button type="button" class="icon-button" data-toggle-password="#register_password">Show</button>
            </span>
          </label>
          <label>Confirm password
            <span class="password-wrap">
              <input id="register_confirm_password" name="confirm_password" type="password" autocomplete="new-password" required>
              <button type="button" class="icon-button" data-toggle-password="#register_confirm_password">Show</button>
            </span>
          </label>
        </div>
        <button class="primary-button full" type="submit">Create Login</button>
        <a class="secondary-button full center-button" href="{{ url_for('auth.login') }}">Back to company login</a>
      </form>
    </main>
    <script src="{{ url_for('static', filename='js/app.js', v=asset_version) }}"></script>
    <script>
      (() => {
        const messageMeta = document.querySelector('meta[name="login-message"]');
        const categoryMeta = document.querySelector('meta[name="login-message-category"]');
        const target = document.querySelector("[data-login-message]");
        const message = messageMeta ? messageMeta.content.trim() : "";
        const category = categoryMeta ? categoryMeta.content.trim() : "info";
        if (!target || !message || message.includes("{".repeat(2))) return;
        target.textContent = message;
        target.classList.add(category || "info");
        target.hidden = false;
      })();
    </script>
  </body>
</html>
