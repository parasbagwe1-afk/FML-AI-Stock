{% extends "base.html" %}
{% block page_title %}Reports{% endblock %}
{% block page_subtitle %}Stock, FIFO, sales, payments, alerts, inter-company, and audit reports.{% endblock %}
{% block content %}
  <section class="report-grid">
    {% for slug, title in reports.items() %}
      <a class="report-card" href="{{ url_for('reports.customer_ledger') if slug == 'customer-ledger' else url_for('reports.item_ledger') if slug == 'item-ledger' else url_for('reports.show', name=slug) }}">
        <strong>{{ title }}</strong>
        <span>Open report</span>
      </a>
    {% endfor %}
  </section>
{% endblock %}
