<div class="line-grid" data-line-grid>
  <div class="line-grid-head">
    <span>Item</span><span>Quantity</span><span>Rate</span><span>GST %</span><span>Total</span><span></span>
  </div>
  <div class="line-row">
    <select name="item_id[]" required>
      <option value="">Select item</option>
      {% for item in items %}
        <option value="{{ item.id }}">{{ item.display_name }}</option>
      {% endfor %}
    </select>
    <input name="quantity[]" type="number" step="0.001" min="0" required>
    <input name="rate[]" type="number" step="0.0001" min="0" required>
    <input name="gst_percent[]" type="number" step="0.01" min="0">
    <output class="line-total-preview">₹0.00</output>
    <button type="button" class="icon-button" data-remove-line>×</button>
  </div>
</div>
<button type="button" class="secondary-button" data-add-line>Add line</button>
