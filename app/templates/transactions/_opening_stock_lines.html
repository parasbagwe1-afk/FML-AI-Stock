<div class="line-grid transfer" data-line-grid>
  <div class="line-grid-head">
    <span>Item</span><span>Quantity</span><span></span>
  </div>
  <div class="line-row opening-line">
    <div class="item-combobox" data-item-picker>
      <input name="item_search[]" type="text" placeholder="Select or type item" autocomplete="off" required data-item-search>
      <input name="item_id[]" type="hidden" data-item-value>
      <button type="button" class="item-combobox-button" data-item-open aria-label="Show item list"></button>
      <datalist data-item-options>
        {% for item in items %}
          <option value="{{ item.display_name }}" data-item-id="{{ item.id }}"></option>
        {% endfor %}
      </datalist>
    </div>
    <input name="quantity[]" type="number" step="0.001" required>
    <button type="button" class="icon-button" data-remove-line>×</button>
  </div>
</div>
<button type="button" class="secondary-button" data-add-line>Add line</button>
