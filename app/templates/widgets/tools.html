<div class="floating-tools" data-floating-tools>
  <div class="floating-tool-actions">
    <button type="button" class="floating-tool-button icon-only" data-tool-toggle="calculator" aria-controls="floating_calculator" aria-expanded="false" aria-label="Calculator" title="Calculator">
      <span data-icon="calculator"></span>
    </button>
    <button type="button" class="floating-tool-button icon-only" data-tool-toggle="calendar" aria-controls="floating_calendar" aria-expanded="false" aria-label="Calendar" title="Calendar">
      <span data-icon="calendar-days"></span>
    </button>
    <button type="button" class="floating-tool-button icon-only" data-tool-toggle="music" aria-controls="floating_music" aria-expanded="false" aria-label="Focus mode" title="Focus mode">
      <span data-icon="headphones"></span>
    </button>
  </div>

  <section id="floating_calculator" class="floating-tool-panel calculator-panel" data-tool-panel="calculator" hidden>
    <div class="tool-panel-title">
      <strong>Calculator</strong>
      <button type="button" class="tool-close" data-tool-close aria-label="Close calculator">x</button>
    </div>
    <output class="calculator-display" data-calc-display>0</output>
    <div class="calculator-grid">
      <button type="button" data-calc-key="clear">C</button>
      <button type="button" data-calc-key="back">Back</button>
      <button type="button" data-calc-key="%">%</button>
      <button type="button" data-calc-key="/">/</button>
      <button type="button" data-calc-key="7">7</button>
      <button type="button" data-calc-key="8">8</button>
      <button type="button" data-calc-key="9">9</button>
      <button type="button" data-calc-key="*">x</button>
      <button type="button" data-calc-key="4">4</button>
      <button type="button" data-calc-key="5">5</button>
      <button type="button" data-calc-key="6">6</button>
      <button type="button" data-calc-key="-">-</button>
      <button type="button" data-calc-key="1">1</button>
      <button type="button" data-calc-key="2">2</button>
      <button type="button" data-calc-key="3">3</button>
      <button type="button" data-calc-key="+">+</button>
      <button type="button" data-calc-key="negate">+/-</button>
      <button type="button" data-calc-key="0">0</button>
      <button type="button" data-calc-key=".">.</button>
      <button type="button" data-calc-key="equals">=</button>
    </div>
  </section>

  <section id="floating_calendar" class="floating-tool-panel calendar-panel" data-tool-panel="calendar" data-calendar-url="{{ url_for('dashboard.calendar_events') }}" hidden>
    <div class="tool-panel-title">
      <strong>Calendar</strong>
      <button type="button" class="tool-close" data-tool-close aria-label="Close calendar">x</button>
    </div>
    <div class="calendar-toolbar">
      <button type="button" data-calendar-prev aria-label="Previous month">&lt;</button>
      <strong data-calendar-title></strong>
      <button type="button" data-calendar-next aria-label="Next month">&gt;</button>
      <button type="button" data-calendar-today>Today</button>
    </div>
    <div class="calendar-weekdays" aria-hidden="true">
      <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
    </div>
    <div class="calendar-grid" data-calendar-grid></div>
    <div class="calendar-event-list">
      <strong data-calendar-selected>Events</strong>
      <div data-calendar-events class="calendar-events"></div>
    </div>
  </section>

  <section id="floating_music" class="floating-tool-panel music-panel" data-tool-panel="music" hidden>
    <div class="tool-panel-title">
      <div>
        <strong>Focus Mode</strong>
        <small>Manual ambient sound</small>
      </div>
      <button type="button" class="tool-close" data-tool-close aria-label="Close focus mode">x</button>
    </div>
    <div class="music-now">
      <span class="music-pulse" aria-hidden="true"></span>
      <div>
        <strong data-music-track-name>Rain</strong>
        <small data-music-status>Ready when you are</small>
      </div>
    </div>
    <label>Track
      <select data-music-track aria-label="Focus mode track">
        <option value="rain">Rain</option>
        <option value="ocean">Ocean Waves</option>
        <option value="piano">Soft Piano</option>
        <option value="forest">Forest</option>
        <option value="coffee">Coffee Shop</option>
        <option value="lofi">Lo-fi Instrumental</option>
      </select>
    </label>
    <div class="music-controls">
      <button type="button" data-music-prev aria-label="Previous track"><span data-icon="skip-back"></span></button>
      <button type="button" class="music-play" data-music-toggle aria-label="Play focus mode"><span data-icon="play"></span></button>
      <button type="button" data-music-next aria-label="Next track"><span data-icon="skip-forward"></span></button>
      <button type="button" data-music-mute aria-label="Mute focus mode"><span data-icon="volume-2"></span></button>
      <button type="button" data-music-loop aria-label="Loop focus mode"><span data-icon="repeat"></span></button>
    </div>
    <label>Volume
      <input type="range" min="0" max="100" value="45" data-music-volume aria-label="Focus mode volume">
    </label>
  </section>
</div>
